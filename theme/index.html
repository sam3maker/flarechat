<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<link rel="icon" href="/favicon.ico">
<title>flarechat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #1a1d2e 0%, #2d1b3d 100%);
  color: #e8e8e8;
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
header {
  padding: 14px 18px; background: rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.room-name { font-weight: 600; font-size: 16px; color: #fff; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; }
.dot.offline { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
.online { font-size: 12px; color: #94a3b8; margin-left: auto; }
.online b { color: #4ade80; }

main {
  flex: 1; overflow-y: auto; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 4px;
}
.msg {
  display: flex; flex-wrap: wrap; align-items: baseline;
  padding: 2px 0; line-height: 1.6; word-break: break-word;
  position: relative;
}
.msg .nick {
  font-size: 13px; font-weight: 600;
  margin-right: 1em;
  flex-shrink: 0; user-select: none;
  cursor: pointer; text-decoration: underline dotted rgba(255,255,255,0.25);
  text-underline-offset: 3px;
}
.msg .nick:hover { text-decoration: underline dotted currentColor; }
.msg .body {
  flex: 1; min-width: 0;
  font-size: 14px; color: #f1f1f1;
  white-space: pre-wrap;
  line-height: 1.55;
}
.msg .body img { max-width: 100%; max-height: 280px; border-radius: 8px; display: block; cursor: pointer; margin-top: 4px; }
.msg .time {
  font-size: 10px; color: #64748b;
  margin-left: 8px; flex-shrink: 0; user-select: none;
}
.msg .recall-btn {
  font-size: 11px; color: #94a3b8;
  background: transparent; border: none; cursor: pointer;
  margin-left: 6px; padding: 2px 6px; border-radius: 4px;
  opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
}
.msg .recall-btn:hover { background: rgba(239,68,68,0.15); color: #ef4444; }
.msg:hover .recall-btn { opacity: 1; }
.msg.recalled .nick { opacity: 0.4; }
.msg.recalled .body { color: #64748b; font-style: italic; }

footer {
  padding: 10px 12px; background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
#nickInput {
  width: 110px; padding: 8px 10px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; border-radius: 8px; font-size: 13px; outline: none;
}
#nickInput:focus { border-color: #6366f1; }
#text {
  flex: 1; padding: 9px 12px; min-height: 38px; max-height: 120px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; border-radius: 8px; font-size: 14px; outline: none;
  font-family: inherit; resize: none; overflow-y: auto; line-height: 1.4;
}
#text:focus { border-color: #6366f1; }
.img-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; flex-shrink: 0; color: #94a3b8;
}
.img-btn:hover { background: rgba(99,102,241,0.2); color: #fff; }
#send {
  padding: 10px 18px; background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer;
  font-weight: 500; flex-shrink: 0;
}
#send:active { transform: scale(0.96); }
#send:disabled { opacity: 0.5; cursor: not-allowed; }

.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: #fff; padding: 10px 18px;
  border-radius: 8px; font-size: 13px; z-index: 200;
  animation: fadeOut 2.5s forwards;
}
@keyframes fadeOut {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300;
  display: flex; align-items: center; justify-content: center; cursor: zoom-out;
}
.lightbox img { max-width: 95vw; max-height: 95vh; }

.room-name { cursor: pointer; padding: 4px 8px; margin-left: -8px; border-radius: 6px; transition: background 0.15s; }
.room-name:hover { background: rgba(255,255,255,0.08); }
.room-name::after { content: " ▾"; font-size: 12px; opacity: 0.6; }

.modal-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 250; backdrop-filter: blur(4px);
}
.modal-mask[hidden] { display: none !important; }
.modal {
  background: #1f2235; border-radius: 12px; padding: 20px;
  width: 90%; max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal h3 { color: #fff; margin-bottom: 14px; font-size: 16px; font-weight: 600; }
.room-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
.room-input-row input {
  flex: 1; padding: 8px 10px; min-width: 0;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; border-radius: 8px; outline: none; font-size: 13px;
}
.room-input-row input:focus { border-color: #6366f1; }
.room-input-row button {
  padding: 8px 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px;
}
.room-input-row button:active { transform: scale(0.96); }
.room-hint {
  font-size: 12px; color: #94a3b8; line-height: 1.5; margin-bottom: 4px;
  padding: 10px 12px; background: rgba(255,255,255,0.03);
  border-radius: 8px; border-left: 2px solid #6366f1;
}
.modal-close {
  margin-top: 14px; width: 100%; padding: 8px;
  background: transparent; border: 1px solid rgba(255,255,255,0.12);
  color: #94a3b8; border-radius: 8px; cursor: pointer; font-size: 13px;
}
.modal-close:hover { background: rgba(255,255,255,0.04); }

/* 用户编号弹窗 */
.uid-box {
  font-size: 28px; font-weight: 700; color: #fff;
  text-align: center; padding: 20px; margin-bottom: 14px;
  background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.15));
  border: 1px dashed rgba(99,102,241,0.4); border-radius: 8px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  letter-spacing: 2px; user-select: all;
}

</style>
</head>
<body>

<header>
  <span class="dot" id="dot"></span>
  <span class="room-name">#lobby</span>
  <span class="online">在线 <b id="online">0</b></span>
</header>

<main id="messages"></main>

<footer>
  <input id="nickInput" placeholder="昵称" maxlength="16" title="点击修改昵称">
  <textarea id="text" placeholder="说点什么...  (Enter 发送 / Shift+Enter 换行)" maxlength="500" rows="1"></textarea>
  <label class="img-btn" title="发送图片">＋<input type="file" accept="image/jpeg,image/png,image/webp,image/gif" id="file" hidden></label>
  <button id="send">发送</button>
</footer>

<div id="roomModal" class="modal-mask" hidden>
  <div class="modal">
    <h3>进入房间</h3>
    <div class="room-input-row">
      <input id="roomInput" placeholder="房间名（小写字母/数字/_-）" maxlength="32" autocomplete="off">
      <button id="roomGo">进入</button>
    </div>
    <div class="room-hint">房间不会公开展示，把房间名直接分享给朋友即可加入。</div>
    <button class="modal-close">关闭</button>
  </div>
</div>

<div id="uidModal" class="modal-mask" hidden>
  <div class="modal">
    <h3 id="uidTitle">用户编号</h3>
    <div class="uid-box" id="uidBox">读取中...</div>
    <div class="room-hint">
      编号是系统自动分配的<strong>永久唯一标识</strong>，同编号可以互相撤回消息。
      编号由服务端生成并校验唯一性，无法手动指定或修改。
    </div>
    <button class="modal-close">关闭</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // 解析房间
  var room = "lobby";
  if (location.pathname.indexOf("/r/") === 0) {
    room = decodeURIComponent(location.pathname.slice(3));
  }
  if (!/^[a-z0-9_-]{1,32}$/.test(room)) room = "lobby";
  document.querySelector(".room-name").textContent = "#" + room;

  // 客户端唯一 ID（用于心跳统计在线人数）
  var clientId = localStorage.getItem("cid");
  if (!clientId) {
    clientId = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    localStorage.setItem("cid", clientId);
  }

  // 永久用户编号（uid）：本地存，没有就找服务端要
  var myUid = localStorage.getItem("uid") || "";
  function ensureUid() {
    if (myUid) return;
    fetch("/api/uid", { method: "POST" })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.ok && data.uid) {
          myUid = data.uid;
          localStorage.setItem("uid", myUid);
        }
      })
      .catch(function(){});
  }
  ensureUid();
  function getUid() { return myUid || ""; }

  // 默认昵称
  var ADJ = ["安静","快乐","勇敢","害羞","聪明","调皮","神秘","闪电","柔软","明亮","遥远","蓝色","金色","森林","海洋","银河","月光","火焰","微风","星辰"];
  var NOUN = ["的猫","的狐","的熊","的兔","的鲸","的鹰","的鹿","的狼","的鸭","的鱼","的狮","的羊","的象","的虎","的雀","的蜂","的海豚","的水母","的考拉"];
  function randNick() {
    return ADJ[Math.floor(Math.random()*ADJ.length)] + NOUN[Math.floor(Math.random()*NOUN.length)] + Math.floor(Math.random()*90+10);
  }

  var nickInput = document.getElementById("nickInput");
  nickInput.value = localStorage.getItem("nick") || randNick();
  function getNick() {
    var v = nickInput.value.trim().slice(0, 16);
    if (!v) { v = randNick(); nickInput.value = v; }
    return v;
  }
  nickInput.addEventListener("change", function() {
    localStorage.setItem("nick", nickInput.value.trim().slice(0, 16));
    toast("昵称已更新");
  });

  // ── 用户编号弹窗（纯展示，不可手动设置）──
  var uidModal = document.getElementById("uidModal");
  var uidTitle = document.getElementById("uidTitle");
  var uidBox = document.getElementById("uidBox");

  function showUid(uid, nick, isMine) {
    uidTitle.textContent = isMine ? "你的专属编号" : (nick + " 的编号");
    uidBox.textContent = uid ? ("#" + uid) : "该用户没有编号（旧消息）";
    uidModal.hidden = false;
    if (isMine && !uid) {
      ensureUid();
      setTimeout(function(){ if (myUid) uidBox.textContent = "#" + myUid; }, 1500);
    }
  }
  function closeUidModal() { uidModal.hidden = true; }
  uidModal.addEventListener("click", function(e){ if (e.target === uidModal) closeUidModal(); });
  uidModal.querySelector(".modal-close").addEventListener("click", closeUidModal);
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && !uidModal.hidden) closeUidModal();
  });

  var online = document.getElementById("online");
  var dot = document.getElementById("dot");
  var msgBox = document.getElementById("messages");
  var textInput = document.getElementById("text");
  var sendBtn = document.getElementById("send");
  var fileInput = document.getElementById("file");
  var lastId = 0;
  var renderedIds = {};    // 已渲染的消息 id，避免重复

  // ── 房间切换 ──
  var roomModal = document.getElementById("roomModal");
  var roomInput = document.getElementById("roomInput");
  document.querySelector(".room-name").onclick = openRoomModal;
  document.querySelector(".modal-close").onclick = function() { roomModal.hidden = true; };
  roomModal.addEventListener("click", function(e) {
    if (e.target === roomModal) roomModal.hidden = true;
  });
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && !roomModal.hidden) roomModal.hidden = true;
  });

  function openRoomModal() {
    roomModal.hidden = false;
    roomInput.value = "";
    setTimeout(function(){ roomInput.focus(); }, 50);
  }
  function gotoRoom(name) {
    name = (name || "").toLowerCase().trim();
    if (!/^[a-z0-9_-]{1,32}$/.test(name)) {
      toast("房间名只能是小写字母、数字、_ 或 -");
      return;
    }
    roomModal.hidden = true;
    location.href = "/r/" + encodeURIComponent(name);
  }
  document.getElementById("roomGo").onclick = function() { gotoRoom(roomInput.value); };
  roomInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") gotoRoom(roomInput.value);
  });

  // ── 历史加载（一次性，初次进入）──
  function loadHistory() {
    fetch("/api/messages?room=" + encodeURIComponent(room))
      .then(function(r){
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function(data) {
        msgBox.innerHTML = "";
        renderedIds = {};
        if (data.ok && data.msgs) {
          data.msgs.forEach(renderMsg);
          if (data.msgs.length > 0) lastId = Number(data.msgs[data.msgs.length - 1].id);
          scrollBottom();
        } else if (!data.ok) {
          toast("加载历史失败：" + (data.msg || "未知错误"));
        }
      })
      .catch(function(err){
        console.error("[loadHistory]", err);
        toast("加载历史失败：" + err.message + "（可能是 Cloudflare 拦截，请检查 WAF 规则）");
      });
  }

  // ── 轮询新消息（每 2 秒）──
  var pollErrorCount = 0;
  function poll() {
    fetch("/api/messages?room=" + encodeURIComponent(room) + "&since=" + lastId)
      .then(function(r){
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function(data) {
        pollErrorCount = 0;
        if (data.ok && data.msgs && data.msgs.length > 0) {
          data.msgs.forEach(renderMsg);
          if (data.msgs.length > 0) lastId = Number(data.msgs[data.msgs.length - 1].id);
          scrollBottom();
        }
      })
      .catch(function(err){
        pollErrorCount++;
        if (pollErrorCount === 3) {
          console.error("[poll]", err);
          toast("轮询失败：" + err.message);
        }
      });
  }

  // ── 在线人数（每 15 秒）──
  function refreshOnline() {
    fetch("/api/online?room=" + encodeURIComponent(room))
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.ok) online.textContent = data.n;
      })
      .catch(function(){});
  }

  function heartbeat() {
    fetch("/api/heartbeat?room=" + encodeURIComponent(room), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ clientId: clientId })
    }).catch(function(){});
  }

  // 启动
  loadHistory();
  heartbeat();
  refreshOnline();
  setInterval(poll, 2000);
  setInterval(function() { heartbeat(); refreshOnline(); }, 15000);

  // ── 渲染消息 ──
  function renderMsg(m) {
    if (!m || !m.id || renderedIds[m.id]) return;
    renderedIds[m.id] = true;

    // 用 uid 判断"自己的消息"（uid 优先，回退到 nick）
    var mine = (m.uid && m.uid === myUid) || (!m.uid && m.nick === getNick());
    var div = document.createElement("div");
    div.className = "msg" + (m.recalled ? " recalled" : "");
    div.dataset.id = m.id;

    var nickEl = document.createElement("span");
    nickEl.className = "nick";
    nickEl.textContent = m.nick;
    nickEl.style.color = m.color || "#cbd5e1";
    nickEl.style.cursor = "pointer";
    nickEl.title = "点击查看编号";
    nickEl.onclick = function() { showUid(m.uid, m.nick, mine); };
    div.appendChild(nickEl);

    var body = document.createElement("div");
    body.className = "body";
    if (m.recalled || m.type === "recalled") {
      body.textContent = "消息已撤回";
    } else if (m.type === "text") {
      body.textContent = m.text;
    } else if (m.type === "image" && m.imageId) {
      var img = document.createElement("img");
      img.loading = "lazy";
      img.src = "/img/" + m.imageId;
      img.onclick = function() { lightbox(img.src); };
      body.appendChild(img);
    }
    div.appendChild(body);

    if (m.ts) {
      var t = document.createElement("span");
      t.className = "time";
      var d = new Date(m.ts);
      t.textContent = d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
      div.appendChild(t);
    }

    if (mine && !m.recalled && m.ts && Date.now() - m.ts < 5 * 60 * 1000) {
      var btn = document.createElement("button");
      btn.className = "recall-btn";
      btn.textContent = "撤回";
      btn.onclick = function(e) {
        e.stopPropagation();
        if (confirm("撤回这条消息？")) recallMsg(m.id, div);
      };
      div.appendChild(btn);
    }

    msgBox.appendChild(div);
  }

  function recallMsg(id, el) {
    fetch("/api/recall", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: id, uid: getUid() })
    })
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (data.ok) {
          if (el) {
            el.classList.add("recalled");
            el.innerHTML = "";
            var nickEl2 = document.createElement("span");
            nickEl2.className = "nick";
            nickEl2.textContent = getNick();
            nickEl2.style.opacity = "0.4";
            var recallBody = document.createElement("div");
            recallBody.className = "body";
            recallBody.textContent = "消息已撤回";
            el.appendChild(nickEl2);
            el.appendChild(recallBody);
          }
          toast("已撤回");
        } else {
          toast(data.msg || "撤回失败");
        }
      })
      .catch(function(){ toast("网络错误"); });
  }

  function scrollBottom() {
    requestAnimationFrame(function() { msgBox.scrollTop = msgBox.scrollHeight; });
  }

  // ── 发送文本 ──
  function resetTextHeight() {
    textInput.style.height = "auto";
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + "px";
  }
  textInput.addEventListener("input", resetTextHeight);

  function sendText() {
    var v = textInput.value.trim();
    if (!v) return;
    sendBtn.disabled = true;
    fetch("/api/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ room: room, type: "text", text: v, nick: getNick(), uid: getUid() })
    })
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (!data.ok) { toast(data.msg || "发送失败"); return; }
        textInput.value = "";
        resetTextHeight();
        if (data.msg && data.msg.id) {
          renderMsg(data.msg);
          var newId = Number(data.msg.id);
          if (newId > lastId) lastId = newId;
          scrollBottom();
        }
      })
      .catch(function(){ toast("网络错误"); })
      .finally(function(){ sendBtn.disabled = false; });
  }
  sendBtn.onclick = sendText;
  textInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  // ── 上传图片 ──
  fileInput.onchange = async function(e) {
    var f = e.target.files[0];
    if (!f) return;
    try {
      var blob = await compressImage(f);
      var fd = new FormData();
      fd.append("file", blob, "img.jpg");
      fd.append("room", room);
      sendBtn.disabled = true;
      var r = await fetch("/api/upload", { method: "POST", body: fd });
      var data = await r.json();
      if (data.ok) {
        var sendResp = await fetch("/api/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ room: room, type: "image", imageId: data.id, nick: getNick(), uid: getUid() })
        });
        var sendData = await sendResp.json();
        if (sendData.ok && sendData.msg && sendData.msg.id) {
          renderMsg(sendData.msg);
          var newId = Number(sendData.msg.id);
          if (newId > lastId) lastId = newId;
          scrollBottom();
        }
      } else {
        toast(data.msg || "上传失败");
      }
    } catch(err) {
      toast("图片处理失败");
    } finally {
      sendBtn.disabled = false;
      fileInput.value = "";
    }
  };

  async function compressImage(file) {
    var bmp = await createImageBitmap(file);
    var canvas = document.createElement("canvas");
    var MAX = 1920;
    var w = bmp.width, h = bmp.height;
    if (w > MAX || h > MAX) {
      var s = MAX / Math.max(w, h);
      w = Math.round(w * s); h = Math.round(h * s);
    }
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(bmp, 0, 0, w, h);
    var q = 0.85;
    var out = await new Promise(function(res) { canvas.toBlob(res, "image/jpeg", q); });
    while (out.size > 1.5 * 1024 * 1024 && q > 0.35) {
      q -= 0.1;
      out = await new Promise(function(res) { canvas.toBlob(res, "image/jpeg", q); });
    }
    return out;
  }

  // ── toast ──
  function toast(msg) {
    var t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 2600);
  }

  // ── lightbox ──
  function lightbox(src) {
    var d = document.createElement("div");
    d.className = "lightbox";
    var i = document.createElement("img");
    i.src = src;
    d.appendChild(i);
    d.onclick = function() { d.remove(); };
    document.body.appendChild(d);
  }
})();
</script>
</body>
</html>
