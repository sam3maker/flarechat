# 仅作参考：纯 Dashboard 部署不需要这个文件
# 如果你后续切换到 wrangler deploy，再用此配置

name = "flarechat"
main = "index.js"
compatibility_date = "2025-06-01"

# KV 绑定：在 Dashboard → flarechat → Settings → Bindings 手动添加
# 变量名：ROOM_INDEX → 你的 KV namespace
[[kv_namespaces.binding]]
name = "ROOM_INDEX"
id = "<在 Dashboard 创建后填这里>"

# TiDB 凭据：在 Dashboard → flarechat → Settings → Variables and Secrets 添加
# TIDB_DATABASE_URL = "mysql://..."

# 注意：本版本无 Durable Objects，纯 HTTP 轮询，可在 Dashboard 直接粘贴 index.js 部署
