name = "anon-chat"
main = "index.js"
compatibility_date = "2025-06-01"

# Durable Object：每个房间一个实例，负责 WebSocket 实时广播
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# KV：房间清单 + 限流计数（复用一个 namespace 省绑定）
[[kv_namespaces.binding]]
name = "ROOM_INDEX"
id = "<运行 `wrangler kv namespace create ROOM_INDEX` 后填这里>"

# TiDB 凭据通过 secret 注入：
#   wrangler secret put TIDB_DATABASE_URL
# 形如：mysql://<user>:<pass>@gateway01.<region>.prod.aws.tidbcloud.com:4000/<db>?ssl={"rejectUnauthorized":true}
